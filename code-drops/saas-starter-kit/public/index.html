<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>SaaS Starter Kit</title>
<style>
  :root{--bg:#05080f;--line:rgba(120,180,220,.16);--panel:rgba(15,24,38,.7);--text:#dbe9f4;--dim:#7f93a8;--accent:#22d3ee;--accent2:#38bdf8;--bad:#f87171}
  *{box-sizing:border-box;margin:0;padding:0}body{font-family:-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;background:radial-gradient(900px 600px at 50% -10%,#0c1a2e,var(--bg));color:var(--text);min-height:100vh;display:flex;flex-direction:column;-webkit-font-smoothing:antialiased}
  header{display:flex;align-items:center;gap:11px;padding:16px 24px;border-bottom:1px solid var(--line)}
  .dot{width:16px;height:16px;border-radius:50%;background:var(--accent);box-shadow:0 0 14px var(--accent)}
  h1{font-size:15px;font-weight:700;letter-spacing:.24em}h1 span{color:var(--accent)}
  .spacer{flex:1}.who{color:var(--dim);font-size:13px}.who b{color:var(--accent2)}
  .ghost{background:none;border:1px solid var(--line);color:var(--dim);border-radius:8px;padding:6px 12px;cursor:pointer;font-size:12px}.ghost:hover{color:var(--accent);border-color:var(--accent)}
  main{flex:1;display:flex;align-items:center;justify-content:center;padding:24px}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:26px;width:100%;max-width:380px}
  .card h2{font-size:17px;margin-bottom:4px}.card p{color:var(--dim);font-size:13px;margin-bottom:18px}
  label{display:block;font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--dim);margin:12px 0 5px}
  input{width:100%;background:#0b1320;border:1px solid var(--line);border-radius:10px;padding:12px 14px;color:var(--text);font-size:14px;outline:none}
  input:focus{border-color:var(--accent)}
  .btn{width:100%;margin-top:18px;border:none;border-radius:10px;padding:13px;font-size:14px;font-weight:600;color:#05080f;background:linear-gradient(135deg,var(--accent2),var(--accent));cursor:pointer}.btn:hover{filter:brightness(1.1)}
  .switch{margin-top:14px;text-align:center;font-size:13px;color:var(--dim)}.switch a{color:var(--accent);cursor:pointer}
  .err{margin-top:12px;color:var(--bad);font-size:13px;min-height:18px}
  .dash{width:100%;max-width:680px}
  .feed{background:var(--panel);border:1px solid var(--line);border-radius:14px;height:300px;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:9px;margin-bottom:14px}
  .feed .ev{font-size:13.5px;line-height:1.5;animation:rise .2s}.feed .ev b{color:var(--accent2)}.feed .ev .t{color:var(--dim);font-size:11px;margin-left:6px}
  @keyframes rise{from{opacity:0;transform:translateY(6px)}}
  .row{display:flex;gap:10px}.row input{flex:1}.row .btn{width:auto;margin:0;padding:0 22px}
  .muted{color:var(--dim);font-size:12px;margin-top:10px;text-align:center}
  .hidden{display:none}
</style>
</head>
<body>
  <header><span class="dot"></span><h1>SAAS&nbsp;<span>KIT</span></h1><div class="spacer"></div>
    <span class="who" id="who"></span><button class="ghost hidden" id="logout">Log out</button></header>
  <main>
    <!-- auth -->
    <div class="card" id="authCard">
      <h2 id="authTitle">Log in</h2>
      <p>Demo of scrypt auth + signed tokens + brute-force lockout.</p>
      <label>Username</label><input id="u" autocomplete="username" />
      <label>Password</label><input id="p" type="password" autocomplete="current-password" />
      <button class="btn" id="go">Log in</button>
      <div class="switch" id="switch">No account? <a id="toSignup">Sign up</a></div>
      <div class="err" id="err"></div>
    </div>
    <!-- dashboard -->
    <div class="dash hidden" id="dash">
      <div class="feed" id="feed"><div class="muted">Live feed — broadcasts appear here in real time (open a 2nd tab to see it sync).</div></div>
      <div class="row"><input id="msg" placeholder="Broadcast a message to all connected clients…" />
        <button class="btn" id="send">Send</button></div>
      <div class="muted">Protected by your token · delivered over Server-Sent Events</div>
    </div>
  </main>
<script>
(function(){"use strict";
  var $=function(i){return document.getElementById(i);},mode='login',token=localStorage.getItem('kit-token'),es=null;
  function show(dash){$('authCard').classList.toggle('hidden',dash);$('dash').classList.toggle('hidden',!dash);$('logout').classList.toggle('hidden',!dash);}
  function setMode(m){mode=m;$('authTitle').textContent=m==='login'?'Log in':'Create account';$('go').textContent=m==='login'?'Log in':'Sign up';
    $('switch').innerHTML=m==='login'?'No account? <a id="toSignup">Sign up</a>':'Have an account? <a id="toSignup">Log in</a>';
    $('toSignup').onclick=function(){setMode(m==='login'?'signup':'login');};$('err').textContent='';}
  function esc(s){var d=document.createElement('div');d.textContent=s;return d.innerHTML;}
  function addEv(e){var f=$('feed');var first=f.querySelector('.muted');if(first)f.innerHTML='';
    var d=document.createElement('div');d.className='ev';d.innerHTML='<b>'+esc(e.user)+'</b> '+esc(e.text)+'<span class="t">'+new Date(e.at).toLocaleTimeString()+'</span>';
    f.appendChild(d);f.scrollTop=f.scrollHeight;}
  function connect(){es=new EventSource('/api/events');es.onmessage=function(ev){try{var e=JSON.parse(ev.data);if(e.type==='message')addEv(e);}catch(_){}}}
  function enter(name){show(true);$('who').innerHTML='Signed in as <b>'+esc(name)+'</b>';connect();}
  function auth(){var u=$('u').value.trim(),p=$('p').value;$('err').textContent='';
    fetch('/api/'+(mode==='login'?'login':'signup'),{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:u,password:p})})
      .then(function(r){return r.json().then(function(d){return{ok:r.ok,d:d};});})
      .then(function(x){if(!x.ok){$('err').textContent=x.d.error||'Failed';return;}token=x.d.token;localStorage.setItem('kit-token',token);enter(x.d.username);})
      .catch(function(){$('err').textContent='Network error';});}
  $('go').onclick=auth;$('p').addEventListener('keydown',function(e){if(e.key==='Enter')auth();});
  $('toSignup').onclick=function(){setMode('signup');};
  $('logout').onclick=function(){localStorage.removeItem('kit-token');token=null;if(es)es.close();show(false);setMode('login');};
  $('send').onclick=function(){var t=$('msg').value.trim();if(!t)return;
    fetch('/api/broadcast',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+token},body:JSON.stringify({text:t})})
      .then(function(r){if(r.status===401){alert('Session expired — log in again.');}});$('msg').value='';};
  $('msg').addEventListener('keydown',function(e){if(e.key==='Enter')$('send').click();});
  // resume session
  if(token){fetch('/api/me',{headers:{'Authorization':'Bearer '+token}}).then(function(r){return r.ok?r.json():Promise.reject();}).then(function(d){enter(d.username);}).catch(function(){localStorage.removeItem('kit-token');});}
})();
</script>
</body>
</html>
