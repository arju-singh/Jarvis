<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
<title>JARVIS — Command Center</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><circle cx='16' cy='16' r='13' fill='none' stroke='%2322d3ee' stroke-width='2'/><circle cx='16' cy='16' r='5' fill='%2322d3ee'/></svg>" />
<style>
  :root{--bg:#04070d;--line:rgba(120,180,220,.14);--panel:rgba(13,22,38,.55);--text:#dbe9f4;--dim:#7f93a8;--accent:#22d3ee;--accent2:#38bdf8;--state:#22d3ee;--glow:0 0 24px rgba(34,211,238,.5)}
  body[data-theme=gold]{--accent:#ffb627;--accent2:#ff8a00;--glow:0 0 24px rgba(255,182,39,.5)}
  body[data-theme=matrix]{--accent:#34d399;--accent2:#10b981;--glow:0 0 24px rgba(52,211,153,.5)}
  body[data-theme=neon]{--accent:#c084fc;--accent2:#f472b6;--glow:0 0 24px rgba(192,132,252,.5)}
  *{box-sizing:border-box;margin:0;padding:0}html,body{height:100%}
  body{font-family:-apple-system,"SF Pro Display","Segoe UI",Roboto,Helvetica,Arial,sans-serif;background:radial-gradient(1200px 800px at 50% -10%,#0c1a2e 0%,var(--bg) 60%);color:var(--text);overflow:hidden;position:relative;display:flex;flex-direction:column;height:100vh;-webkit-font-smoothing:antialiased}
  body::before{content:"";position:fixed;inset:-50% -50% -10% -50%;z-index:0;background-image:linear-gradient(var(--line) 1px,transparent 1px),linear-gradient(90deg,var(--line) 1px,transparent 1px);background-size:46px 46px;transform:perspective(420px) rotateX(62deg);transform-origin:50% 100%;opacity:.5;animation:grid 8s linear infinite;-webkit-mask-image:radial-gradient(closest-side at 50% 40%,#000 30%,transparent 78%);mask-image:radial-gradient(closest-side at 50% 40%,#000 30%,transparent 78%)}
  @keyframes grid{to{background-position:0 46px,46px 0}}
  header{position:relative;z-index:6;display:flex;align-items:center;gap:14px;padding:14px 22px;border-bottom:1px solid var(--line);background:linear-gradient(180deg,rgba(8,15,26,.7),transparent)}
  .brand{display:flex;align-items:center;gap:11px}.brand .ring{width:18px;height:18px;border-radius:50%;border:2px solid var(--accent);position:relative;box-shadow:var(--glow)}.brand .ring::after{content:"";position:absolute;inset:4px;border-radius:50%;background:var(--accent)}
  h1{font-size:16px;font-weight:700;letter-spacing:.3em}h1 span{color:var(--accent)}.spacer{flex:1}
  .meta{display:flex;align-items:center;gap:16px;color:var(--dim);font-size:12px}
  #clock{font-variant-numeric:tabular-nums;font-size:15px;color:var(--text);letter-spacing:.08em}
  .sys{font-size:11px;color:var(--dim);font-variant-numeric:tabular-nums;display:flex;gap:11px}.sys b{color:var(--accent2);font-weight:600}
  .conn{display:flex;align-items:center;gap:7px;text-transform:uppercase;letter-spacing:.1em;font-size:10px}.conn .led{width:8px;height:8px;border-radius:50%;background:#f87171;box-shadow:0 0 8px #f87171;transition:.3s}body.online .conn .led{background:#34d399;box-shadow:0 0 9px #34d399}
  .themes{display:flex;gap:6px}.themes b{width:15px;height:15px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:.15s}.themes b:hover{transform:scale(1.15)}.themes b.on{border-color:#fff}
  .iconbtn{width:32px;height:32px;border-radius:8px;border:1px solid var(--line);background:var(--panel);color:var(--dim);cursor:pointer;font-size:14px;transition:.15s}.iconbtn:hover{color:var(--accent);border-color:var(--accent)}
  @media(max-width:820px){.sys{display:none}}
  main{position:relative;z-index:3;flex:1;display:flex;min-height:0}
  .stage{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;min-width:0;padding:8px}
  .corewrap{position:relative;width:min(46vh,380px);aspect-ratio:1;display:flex;align-items:center;justify-content:center}
  #viz{position:absolute;inset:0;width:100%;height:100%}
  .core{position:relative;width:64%;aspect-ratio:1}.core .ringx{position:absolute;inset:0;border-radius:50%;border:1.5px solid rgba(120,180,220,.25)}
  .r1{animation:spin 14s linear infinite}.r2{inset:12%!important;border-style:dashed;border-color:rgba(120,180,220,.3);animation:spin 9s linear infinite reverse}.r4{inset:26%!important;border-top-color:var(--accent);border-right-color:transparent;border-bottom-color:transparent;border-left-color:transparent;animation:spin 3.2s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  .orb{position:absolute;inset:34%;border-radius:50%;background:radial-gradient(circle at 35% 30%,#fff,var(--accent) 42%,#0a3a4d 100%);box-shadow:0 0 45px var(--accent),inset 0 0 30px rgba(0,0,0,.35);animation:breath 3.4s ease-in-out infinite;transition:background .5s,box-shadow .5s}
  @keyframes breath{0%,100%{transform:scale(.96)}50%{transform:scale(1.04)}}
  .pulse{position:absolute;inset:30%;border-radius:50%;border:2px solid var(--state);opacity:0}body.s-listening .pulse{animation:pulse 1.6s ease-out infinite}body.s-listening .pulse.d{animation-delay:.8s}
  @keyframes pulse{0%{inset:30%;opacity:.7}100%{inset:-8%;opacity:0}}body.s-speaking .orb{animation:breath 1s ease-in-out infinite}
  .status{text-align:center}.badge{display:inline-block;font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--state);border:1px solid var(--state);border-radius:20px;padding:3px 12px;margin-bottom:9px;transition:.3s}
  .status .word{font-size:23px;font-weight:600;letter-spacing:.1em;color:var(--state);text-shadow:0 0 18px var(--state);transition:color .4s}.status .hint{margin-top:6px;color:var(--dim);font-size:13px;min-height:18px}
  body.s-listening{--state:#38bdf8}body.s-thinking{--state:#a78bfa}body.s-speaking{--state:#34d399}
  .chips{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;max-width:560px}
  .chip{font-size:12px;color:var(--text);background:var(--panel);border:1px solid var(--line);border-radius:18px;padding:7px 13px;cursor:pointer;transition:.15s;white-space:nowrap}.chip:hover{border-color:var(--accent);color:var(--accent);box-shadow:var(--glow)}
  .convo{width:min(38%,440px);display:flex;flex-direction:column;min-width:0;border-left:1px solid var(--line);background:linear-gradient(180deg,rgba(8,14,24,.5),rgba(6,10,18,.2));backdrop-filter:blur(7px)}
  .convo .top{display:flex;align-items:center;justify-content:space-between;padding:14px 16px 9px}.convo h2{font-size:11px;letter-spacing:.2em;color:var(--dim);font-weight:600;text-transform:uppercase}
  .convo .top button{font-size:10.5px;color:var(--dim);background:none;border:1px solid var(--line);border-radius:7px;padding:4px 9px;cursor:pointer;transition:.15s}.convo .top button:hover{color:var(--accent);border-color:var(--accent)}
  #log{flex:1;overflow-y:auto;padding:4px 16px 16px;display:flex;flex-direction:column;gap:11px}#log::-webkit-scrollbar{width:6px}#log::-webkit-scrollbar-thumb{background:rgba(120,180,220,.25);border-radius:3px}
  .msg{max-width:90%;padding:10px 13px;border-radius:13px;font-size:13.5px;line-height:1.5;animation:rise .25s ease;position:relative}@keyframes rise{from{opacity:0;transform:translateY(8px)}}
  .msg .who{font-size:9.5px;letter-spacing:.15em;text-transform:uppercase;opacity:.7;margin-bottom:3px}
  .me{align-self:flex-end;background:linear-gradient(135deg,#15324a,#0f2334);border:1px solid rgba(120,180,220,.3)}.me .who{color:var(--accent2)}
  .jv{align-self:flex-start;background:rgba(10,20,32,.7);border:1px solid var(--line)}.jv .who{color:var(--accent)}
  .jv .copy{position:absolute;top:6px;right:8px;font-size:11px;color:var(--dim);cursor:pointer;opacity:0;transition:.15s}.jv:hover .copy{opacity:1}.jv .copy:hover{color:var(--accent)}
  .sysmsg{align-self:center;color:var(--dim);font-size:12px;font-style:italic;background:none}.empty{color:var(--dim);font-size:13px;text-align:center;margin:auto;padding:20px;line-height:1.6}
  @media(max-width:760px){.convo{display:none}.corewrap{width:64vw}}
  footer{position:relative;z-index:6;padding:13px 20px;border-top:1px solid var(--line);background:linear-gradient(0deg,rgba(8,15,26,.85),transparent)}
  form{display:flex;gap:10px;align-items:center;max-width:1100px;margin:0 auto}
  .mic{width:48px;height:48px;flex:none;border-radius:50%;border:1.5px solid var(--accent);background:rgba(34,211,238,.08);color:var(--accent);font-size:19px;cursor:pointer;transition:.2s;box-shadow:var(--glow)}.mic:hover{filter:brightness(1.2)}.mic.rec{background:var(--accent);color:#04070d;animation:breath 1s infinite}
  input[type=text]{flex:1;background:var(--panel);border:1px solid var(--line);border-radius:26px;padding:14px 20px;color:var(--text);font-size:14.5px;outline:none;transition:.2s}input[type=text]:focus{border-color:var(--accent);box-shadow:var(--glow)}input::placeholder{color:var(--dim)}
  .stop{width:48px;height:48px;flex:none;border-radius:50%;border:1px solid rgba(248,113,113,.5);background:rgba(248,113,113,.08);color:#f87171;font-size:15px;cursor:pointer;transition:.2s}.stop:hover{background:rgba(248,113,113,.2)}
  button.send{padding:0 24px;height:48px;border-radius:26px;border:none;cursor:pointer;font-size:14px;font-weight:600;letter-spacing:.05em;color:#04070d;background:linear-gradient(135deg,var(--accent2),var(--accent));transition:.2s}button.send:hover{filter:brightness(1.12)}button.send:disabled{opacity:.45;cursor:default}
  .kbd{position:fixed;bottom:78px;left:50%;transform:translateX(-50%);z-index:7;font-size:11px;color:var(--dim);background:rgba(8,15,26,.9);border:1px solid var(--line);border-radius:8px;padding:6px 12px;opacity:0;transition:.3s;pointer-events:none}.kbd.show{opacity:1}.kbd b{color:var(--accent2)}
</style>
</head>
<body class="s-idle" data-theme="arc">
  <header>
    <div class="brand"><span class="ring"></span><h1 id="brand">JARVIS</h1></div>
    <div class="spacer"></div>
    <div class="themes" id="themes" title="Theme">
      <b data-t="arc" style="background:#22d3ee"></b><b data-t="gold" style="background:#ffb627"></b>
      <b data-t="matrix" style="background:#34d399"></b><b data-t="neon" style="background:#c084fc"></b>
    </div>
    <div class="meta"><span id="sys" class="sys"></span><span id="clock">--:--:--</span>
      <span class="conn"><span class="led"></span><span id="connText">offline</span></span></div>
    <button class="iconbtn" id="fsBtn" title="Fullscreen (F)">&#9974;</button>
  </header>
  <main>
    <section class="stage">
      <div class="corewrap"><canvas id="viz"></canvas>
        <div class="core"><div class="ringx r1"></div><div class="ringx r2"></div><div class="ringx r4"></div>
          <div class="pulse"></div><div class="pulse d"></div><div class="orb"></div></div></div>
      <div class="status"><span class="badge" id="badge">IDLE</span>
        <div class="word" id="stateWord">READY</div>
        <div class="hint" id="stateHint">Type below, or wire a voice pipeline to the event bus.</div></div>
      <div class="chips" id="chips"></div>
    </section>
    <aside class="convo">
      <div class="top"><h2>Conversation</h2><div><button id="clearBtn">Clear</button></div></div>
      <div id="log"><div class="empty">No messages yet.<br>Type to begin.</div></div>
    </aside>
  </main>
  <footer><form id="form" autocomplete="off">
    <button type="button" class="mic" id="mic" title="Talk (Space)">&#127908;</button>
    <input type="text" id="input" placeholder="Ask anything&hellip;  ( / to focus )" autofocus />
    <button type="button" class="stop" id="stopBtn" title="Stop (Esc)">&#9632;</button>
    <button type="submit" class="send" id="send">Send</button>
  </form></footer>
  <div class="kbd" id="kbd"><b>/</b> focus &nbsp; <b>Space</b> talk &nbsp; <b>Esc</b> stop &nbsp; <b>F</b> fullscreen</div>
<script>
(function(){"use strict";
  var $=function(id){return document.getElementById(id);};
  var logEl=$('log'),input=$('input'),send=$('send'),form=$('form'),mic=$('mic'),
      stateWord=$('stateWord'),stateHint=$('stateHint'),badge=$('badge'),connText=$('connText'),clock=$('clock'),sysEl=$('sys');
  var firstMsg=true,speakPoll=null,curState='idle';
  function tick(){var d=new Date(),p=function(n){return(n<10?'0':'')+n;};clock.textContent=p(d.getHours())+':'+p(d.getMinutes())+':'+p(d.getSeconds());}
  tick();setInterval(tick,1000);
  function setTheme(t){document.body.setAttribute('data-theme',t);var d=document.querySelectorAll('#themes b');for(var i=0;i<d.length;i++)d[i].classList.toggle('on',d[i].getAttribute('data-t')===t);try{localStorage.setItem('cc-theme',t);}catch(_){}}
  $('themes').addEventListener('click',function(e){var t=e.target.getAttribute('data-t');if(t)setTheme(t);});
  setTheme((function(){try{return localStorage.getItem('cc-theme')||'arc';}catch(_){return 'arc';}})());
  function fmtUp(s){var h=Math.floor(s/3600),m=Math.floor(s%3600/60);return h?h+'h '+m+'m':m+'m';}
  function stats(){fetch('/stats').then(function(r){return r.json();}).then(function(d){
    sysEl.innerHTML='<span title="brain">'+d.brain+'</span><span>CPU<b>'+d.cpu+'%</b></span><span>RAM<b>'+d.mem+'%</b></span><span>&#8987;<b>'+fmtUp(d.uptime)+'</b></span>';
  }).catch(function(){});}
  stats();setInterval(stats,5000);
  var STATES={idle:{word:'READY',hint:'Type below, or wire a voice pipeline to the event bus.',cls:'idle'},listening:{word:'LISTENING',hint:'I’m listening…',cls:'listening'},transcribing:{word:'…',hint:'Catching your words…',cls:'thinking'},thinking:{word:'THINKING',hint:'Working on it…',cls:'thinking'},speaking:{word:'SPEAKING',hint:'Responding…',cls:'speaking'}};
  function setState(s){var c=STATES[s]||STATES.idle;curState=s;document.body.className='s-'+c.cls+(document.body.classList.contains('online')?' online':'');stateWord.textContent=c.word;stateHint.textContent=c.hint;badge.textContent=(STATES[s]?s:'idle').toUpperCase();if(s!=='speaking'&&speakPoll){clearInterval(speakPoll);speakPoll=null;}}
  var HIST=[];try{HIST=JSON.parse(localStorage.getItem('cc-hist')||'[]');}catch(_){HIST=[];}
  function persist(){try{localStorage.setItem('cc-hist',JSON.stringify(HIST.slice(-60)));}catch(_){}}
  function render(kind,text){if(firstMsg){logEl.innerHTML='';firstMsg=false;}var m=document.createElement('div');m.className='msg '+kind;var who=kind==='me'?'You':kind==='jv'?(brandName):'';if(who){var w=document.createElement('div');w.className='who';w.textContent=who;m.appendChild(w);}var t=document.createElement('div');t.textContent=text;m.appendChild(t);if(kind==='jv'){var c=document.createElement('span');c.className='copy';c.textContent='⧉';c.title='Copy';c.onclick=function(){navigator.clipboard&&navigator.clipboard.writeText(text);};m.appendChild(c);}logEl.appendChild(m);logEl.scrollTop=logEl.scrollHeight;}
  function addMsg(kind,text,save){render(kind,text);if(save!==false&&kind!=='sysmsg'){HIST.push([kind,text]);persist();}}
  if(HIST.length){for(var i=0;i<HIST.length;i++)render(HIST[i][0],HIST[i][1]);}
  $('clearBtn').addEventListener('click',function(){HIST=[];persist();logEl.innerHTML='<div class="empty">Cleared.</div>';firstMsg=true;});
  function watchSpeaking(){if(speakPoll)clearInterval(speakPoll);speakPoll=setInterval(function(){fetch('/speaking').then(function(r){return r.json();}).then(function(d){if(!d.speaking){clearInterval(speakPoll);speakPoll=null;setState('idle');}}).catch(function(){});},500);}
  var brandName='JARVIS',sseOK=false;
  function connect(){var es=new EventSource('/events');
    es.onopen=function(){sseOK=true;document.body.classList.add('online');connText.textContent='connected';};
    es.onerror=function(){sseOK=false;document.body.classList.remove('online');connText.textContent='reconnecting';};
    es.onmessage=function(ev){var e;try{e=JSON.parse(ev.data);}catch(_){return;}switch(e.type){
      case 'hello':if(e.name){brandName=e.name;$('brand').textContent=e.name;document.title=e.name+' — Command Center';}break;
      case 'listening':setState('listening');break;case 'transcribing':setState('transcribing');break;
      case 'user':addMsg('me',e.text);break;case 'thinking':setState('thinking');break;
      case 'reply':addMsg('jv',e.text);setState('speaking');watchSpeaking();break;
      case 'speaking':setState('speaking');watchSpeaking();break;case 'idle':setState('idle');break;
      case 'error':render('sysmsg',e.text||'Error');setState('idle');break;}};}
  connect();
  function sendText(text){text=(text||'').trim();if(!text)return;send.disabled=true;if(!sseOK){addMsg('me',text);setState('thinking');}
    fetch('/turn',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({text:text})})
      .then(function(r){return r.json();}).then(function(d){if(!sseOK){if(d.reply)addMsg('jv',d.reply);else render('sysmsg',d.error||'Error');setState('idle');}})
      .catch(function(){render('sysmsg','Could not reach the server.');setState('idle');})
      .finally(function(){send.disabled=false;input.focus();});}
  form.addEventListener('submit',function(ev){ev.preventDefault();var t=input.value;input.value='';sendText(t);});
  ['What time is it?','Weather in Tokyo','Weather in London','What can you do?'].forEach(function(c){var b=document.createElement('button');b.className='chip';b.textContent=c;b.onclick=function(){sendText(c);};$('chips').appendChild(b);});
  $('stopBtn').addEventListener('click',function(){fetch('/stop',{method:'POST'}).catch(function(){});setState('idle');});
  function toggleFs(){if(!document.fullscreenElement){document.documentElement.requestFullscreen&&document.documentElement.requestFullscreen();}else{document.exitFullscreen&&document.exitFullscreen();}}
  $('fsBtn').addEventListener('click',toggleFs);
  document.addEventListener('keydown',function(e){if(e.target===input){if(e.key==='Escape')input.blur();return;}if(e.key==='/'){e.preventDefault();input.focus();}else if(e.key===' '){e.preventDefault();mic.click();}else if(e.key==='Escape'){fetch('/stop',{method:'POST'}).catch(function(){});setState('idle');}else if(e.key==='f'||e.key==='F'){toggleFs();}});
  var kbd=$('kbd');setTimeout(function(){kbd.classList.add('show');setTimeout(function(){kbd.classList.remove('show');},4200);},900);
  var SR=window.SpeechRecognition||window.webkitSpeechRecognition,rec=null;
  if(SR){rec=new SR();rec.lang='en-US';rec.interimResults=false;rec.maxAlternatives=1;rec.onresult=function(ev){sendText(ev.results[0][0].transcript);};rec.onend=function(){mic.classList.remove('rec');};rec.onerror=function(){mic.classList.remove('rec');};
    mic.addEventListener('click',function(){if(mic.classList.contains('rec')){rec.stop();return;}try{rec.start();mic.classList.add('rec');setState('listening');}catch(_){}});}
  else{mic.title='Browser mic not supported — type instead.';mic.addEventListener('click',function(){input.focus();});}
  var cv=$('viz'),cx=cv.getContext('2d'),analyser=null,freq=null,phase=0;
  function sizeCanvas(){var r=cv.getBoundingClientRect(),dpr=window.devicePixelRatio||1;cv.width=r.width*dpr;cv.height=r.height*dpr;cx.setTransform(dpr,0,0,dpr,0,0);}
  window.addEventListener('resize',sizeCanvas);sizeCanvas();
  function accent(){return getComputedStyle(document.body).getPropertyValue('--accent').trim()||'#22d3ee';}
  var BARS=72;
  function draw(){var w=cv.clientWidth,h=cv.clientHeight,base=Math.min(w,h)*0.36;cx.clearRect(0,0,w,h);phase+=0.01;
    var amp=curState==='speaking'?1:curState==='listening'?0.6:curState==='thinking'?0.45:0.22;
    if(analyser)analyser.getByteFrequencyData(freq);cx.save();cx.translate(w/2,h/2);var col=accent();
    for(var i=0;i<BARS;i++){var v=analyser?freq[i%freq.length]/255:amp*(0.45+0.55*Math.abs(Math.sin(phase*3+i*0.5))*Math.abs(Math.cos(phase+i*0.13)));
      var len=base*(0.12+v*0.5),a=(i/BARS)*Math.PI*2,x1=Math.cos(a)*base,y1=Math.sin(a)*base,x2=Math.cos(a)*(base+len),y2=Math.sin(a)*(base+len);
      cx.strokeStyle=col;cx.globalAlpha=0.25+v*0.7;cx.lineWidth=2.4;cx.lineCap='round';cx.beginPath();cx.moveTo(x1,y1);cx.lineTo(x2,y2);cx.stroke();}
    cx.restore();requestAnimationFrame(draw);}
  requestAnimationFrame(draw);
})();
</script>
</body>
</html>
