<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Jarvis</title>
<style>
  :root { --bg:#0b0f14; --panel:#121821; --me:#1f6feb; --jarvis:#0e2a33; --accent:#22d3ee; --text:#e6edf3; --dim:#7d8590; }
  * { box-sizing: border-box; }
  body { margin:0; background:var(--bg); color:var(--text); font:16px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; height:100vh; display:flex; flex-direction:column; }
  header { padding:14px 18px; border-bottom:1px solid #1c2530; display:flex; align-items:center; gap:10px; }
  header .dot { width:10px; height:10px; border-radius:50%; background:var(--accent); box-shadow:0 0 10px var(--accent); }
  header h1 { font-size:17px; margin:0; letter-spacing:1px; }
  header .status { margin-left:auto; color:var(--dim); font-size:13px; }
  #log { flex:1; overflow-y:auto; padding:18px; display:flex; flex-direction:column; gap:12px; }
  .msg { max-width:78%; padding:10px 14px; border-radius:14px; white-space:pre-wrap; word-wrap:break-word; }
  .me { align-self:flex-end; background:var(--me); border-bottom-right-radius:4px; }
  .jarvis { align-self:flex-start; background:var(--jarvis); border:1px solid #1c3a44; border-bottom-left-radius:4px; }
  .err { align-self:flex-start; background:#3a1620; border:1px solid #5c2230; color:#ffb4c0; }
  .typing { color:var(--dim); font-style:italic; }
  form { display:flex; gap:10px; padding:14px 18px; border-top:1px solid #1c2530; }
  input { flex:1; background:var(--panel); border:1px solid #243041; color:var(--text); border-radius:10px; padding:12px 14px; font-size:16px; outline:none; }
  input:focus { border-color:var(--accent); }
  button { border:0; border-radius:10px; padding:0 16px; font-size:16px; cursor:pointer; color:#fff; background:var(--me); }
  button.mic { background:var(--panel); border:1px solid #243041; width:48px; padding:0; }
  button.mic.live { background:#b3261e; border-color:#b3261e; animation:pulse 1.2s infinite; }
  button:disabled { opacity:.5; cursor:default; }
  @keyframes pulse { 0%,100%{ box-shadow:0 0 0 0 rgba(179,38,30,.6);} 50%{ box-shadow:0 0 0 8px rgba(179,38,30,0);} }
</style>
</head>
<body>
  <header>
    <span class="dot"></span>
    <h1>JARVIS</h1>
    <span class="status" id="status">ready</span>
  </header>
  <div id="log"></div>
  <form id="form">
    <button type="button" class="mic" id="mic" title="Speak">🎤</button>
    <input id="input" placeholder="Message Jarvis…" autocomplete="off" autofocus />
    <button type="submit" id="send">Send</button>
  </form>

<script>
const log = document.getElementById('log');
const form = document.getElementById('form');
const input = document.getElementById('input');
const send = document.getElementById('send');
const micBtn = document.getElementById('mic');
const statusEl = document.getElementById('status');

function bubble(text, cls) {
  const el = document.createElement('div');
  el.className = 'msg ' + cls;
  el.textContent = text;
  log.appendChild(el);
  log.scrollTop = log.scrollHeight;
  return el;
}

async function sendText(text) {
  text = text.trim();
  if (!text) return;
  bubble(text, 'me');
  input.value = '';
  send.disabled = true;
  statusEl.textContent = 'thinking…';
  const thinking = bubble('Jarvis is thinking…', 'jarvis typing');
  try {
    const res = await fetch('/turn', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ text }),
    });
    const data = await res.json();
    thinking.remove();
    if (!res.ok) { bubble('Error: ' + (data.error || res.status), 'err'); }
    else { bubble(data.reply || '(no reply)', 'jarvis'); }
  } catch (e) {
    thinking.remove();
    bubble('Could not reach the brain: ' + e.message, 'err');
  } finally {
    send.disabled = false;
    statusEl.textContent = 'ready';
    input.focus();
  }
}

form.addEventListener('submit', (e) => { e.preventDefault(); sendText(input.value); });

// Voice input via the browser's built-in speech recognition (Chrome/Edge).
const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
if (!SR) {
  micBtn.style.display = 'none';
} else {
  const rec = new SR();
  rec.lang = 'en-IN';
  rec.interimResults = false;
  let listening = false;
  micBtn.addEventListener('click', () => {
    if (listening) { rec.stop(); return; }
    rec.start();
  });
  rec.onstart = () => { listening = true; micBtn.classList.add('live'); statusEl.textContent = 'listening…'; };
  rec.onend = () => { listening = false; micBtn.classList.remove('live'); if (statusEl.textContent === 'listening…') statusEl.textContent = 'ready'; };
  rec.onerror = (ev) => { statusEl.textContent = 'mic: ' + ev.error; };
  rec.onresult = (ev) => { sendText(ev.results[0][0].transcript); };
}

bubble("Hi, I'm Jarvis. Type or tap the mic to talk. My voice plays on the machine running the brain.", 'jarvis');
</script>
</body>
</html>
