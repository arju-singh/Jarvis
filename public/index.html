<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
<title>ARJU JARVIS</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><circle cx='16' cy='16' r='13' fill='none' stroke='%2322d3ee' stroke-width='2'/><circle cx='16' cy='16' r='5' fill='%2322d3ee'/></svg>" />
<style>
  :root{
    --bg:#04070d; --bg2:#0a121f; --panel:rgba(13,22,38,.55); --line:rgba(90,170,210,.16);
    --text:#dbe9f4; --dim:#7f93a8; --accent:#22d3ee; --accent2:#38bdf8;
    --glow:0 0 24px rgba(34,211,238,.55);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    font-family:-apple-system,"SF Pro Display","Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:radial-gradient(1200px 800px at 50% -10%, #0c1a2e 0%, var(--bg) 60%);
    color:var(--text); overflow:hidden; position:relative;
    display:flex; flex-direction:column; height:100vh;
    -webkit-font-smoothing:antialiased;
  }
  /* moving grid floor */
  body::before{
    content:""; position:fixed; inset:-50% -50% -10% -50%; z-index:0;
    background-image:linear-gradient(var(--line) 1px,transparent 1px),linear-gradient(90deg,var(--line) 1px,transparent 1px);
    background-size:46px 46px; transform:perspective(420px) rotateX(62deg) translateY(0);
    transform-origin:50% 100%; opacity:.5; animation:grid 8s linear infinite;
    -webkit-mask-image:radial-gradient(closest-side at 50% 40%, #000 30%, transparent 78%);
            mask-image:radial-gradient(closest-side at 50% 40%, #000 30%, transparent 78%);
  }
  @keyframes grid{to{background-position:0 46px,46px 0}}

  header{
    position:relative; z-index:5; display:flex; align-items:center; gap:14px;
    padding:16px 24px; border-bottom:1px solid var(--line);
    background:linear-gradient(180deg,rgba(8,15,26,.7),transparent);
  }
  .brand{display:flex; align-items:center; gap:11px}
  .brand .ring{width:18px;height:18px;border-radius:50%;border:2px solid var(--accent);position:relative;box-shadow:var(--glow)}
  .brand .ring::after{content:"";position:absolute;inset:4px;border-radius:50%;background:var(--accent)}
  h1{font-size:17px;font-weight:700;letter-spacing:.32em}
  h1 span{color:var(--accent)}
  .spacer{flex:1}
  .meta{display:flex;align-items:center;gap:18px;color:var(--dim);font-size:12px;letter-spacing:.05em}
  #clock{font-variant-numeric:tabular-nums;font-size:15px;color:var(--text);letter-spacing:.08em}
  .sys{font-size:11px;color:var(--dim);letter-spacing:.04em;font-variant-numeric:tabular-nums}
  .sys b{color:var(--accent2);font-weight:600}
  @media(max-width:680px){.sys{display:none}}
  .conn{display:flex;align-items:center;gap:7px;text-transform:uppercase;letter-spacing:.12em;font-size:10.5px}
  .conn .led{width:8px;height:8px;border-radius:50%;background:#f87171;box-shadow:0 0 8px #f87171;transition:.3s}
  body.online .conn .led{background:#34d399;box-shadow:0 0 9px #34d399}

  main{position:relative;z-index:3;flex:1;display:flex;min-height:0}

  /* reactive core */
  .stage{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:26px;min-width:0;padding:10px}
  .core{position:relative;width:min(46vh,360px);aspect-ratio:1}
  .core .ringx{position:absolute;inset:0;border-radius:50%;border:1.5px solid rgba(56,189,248,.28)}
  .r1{animation:spin 14s linear infinite}
  .r2{inset:9%!important;border-style:dashed;border-color:rgba(34,211,238,.35);animation:spin 9s linear infinite reverse}
  .r3{inset:20%!important;border-color:rgba(56,189,248,.5)}
  .r4{inset:30%!important;border-top-color:var(--accent);border-right-color:transparent;border-bottom-color:transparent;border-left-color:transparent;animation:spin 3.2s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  .orb{
    position:absolute;inset:34%;border-radius:50%;
    background:radial-gradient(circle at 35% 30%, #aef3ff, var(--accent) 42%, #0a4a63 100%);
    box-shadow:0 0 45px rgba(34,211,238,.6),inset 0 0 30px rgba(0,0,0,.35);
    animation:breath 3.4s ease-in-out infinite; transition:background .5s, box-shadow .5s;
  }
  @keyframes breath{0%,100%{transform:scale(.96)}50%{transform:scale(1.04)}}
  /* expanding pulse rings (listening) */
  .pulse{position:absolute;inset:30%;border-radius:50%;border:2px solid var(--accent);opacity:0}
  body.s-listening .pulse{animation:pulse 1.6s ease-out infinite}
  body.s-listening .pulse.d{animation-delay:.8s}
  @keyframes pulse{0%{inset:30%;opacity:.7}100%{inset:-6%;opacity:0}}
  /* equalizer (speaking) */
  .eq{position:absolute;inset:0;display:none;align-items:center;justify-content:center;gap:5px}
  body.s-speaking .eq{display:flex}
  body.s-speaking .orb{animation:breath 1s ease-in-out infinite}
  .eq i{width:5px;height:14%;background:linear-gradient(var(--accent2),var(--accent));border-radius:3px;box-shadow:var(--glow);animation:eq .9s ease-in-out infinite}
  .eq i:nth-child(2){animation-delay:.15s}.eq i:nth-child(3){animation-delay:.3s}
  .eq i:nth-child(4){animation-delay:.45s}.eq i:nth-child(5){animation-delay:.2s}
  .eq i:nth-child(6){animation-delay:.38s}.eq i:nth-child(7){animation-delay:.1s}
  @keyframes eq{0%,100%{height:10%}50%{height:46%}}

  .status{text-align:center}
  .status .word{font-size:24px;font-weight:600;letter-spacing:.12em;color:var(--accent);transition:color .4s;text-shadow:0 0 18px rgba(34,211,238,.4)}
  .status .hint{margin-top:7px;color:var(--dim);font-size:13px;letter-spacing:.04em;min-height:18px}

  /* state color theming */
  body.s-listening{--accent:#38bdf8;--accent2:#7dd3fc;--glow:0 0 28px rgba(56,189,248,.7)}
  body.s-thinking{--accent:#a78bfa;--accent2:#c4b5fd;--glow:0 0 26px rgba(167,139,250,.6)}
  body.s-speaking{--accent:#34d399;--accent2:#6ee7b7;--glow:0 0 26px rgba(52,211,153,.6)}

  /* conversation panel */
  .convo{
    width:min(38%,440px); display:flex; flex-direction:column; min-width:0;
    border-left:1px solid var(--line); background:linear-gradient(180deg,rgba(8,14,24,.5),rgba(6,10,18,.2));
    backdrop-filter:blur(7px);
  }
  .convo h2{font-size:11px;letter-spacing:.22em;color:var(--dim);font-weight:600;padding:16px 18px 10px;text-transform:uppercase}
  #log{flex:1;overflow-y:auto;padding:4px 16px 16px;display:flex;flex-direction:column;gap:11px}
  #log::-webkit-scrollbar{width:6px}#log::-webkit-scrollbar-thumb{background:rgba(90,170,210,.25);border-radius:3px}
  .msg{max-width:88%;padding:10px 13px;border-radius:13px;font-size:13.5px;line-height:1.5;animation:rise .25s ease}
  @keyframes rise{from{opacity:0;transform:translateY(8px)}}
  .msg .who{font-size:9.5px;letter-spacing:.16em;text-transform:uppercase;opacity:.7;margin-bottom:3px}
  .me{align-self:flex-end;background:linear-gradient(135deg,#15324a,#0f2334);border:1px solid rgba(56,189,248,.3)}
  .me .who{color:var(--accent2)}
  .jv{align-self:flex-start;background:rgba(10,20,32,.7);border:1px solid var(--line)}
  .jv .who{color:var(--accent)}
  .sys{align-self:center;color:var(--dim);font-size:12px;font-style:italic;background:none}
  .empty{color:var(--dim);font-size:13px;text-align:center;margin:auto;padding:20px;line-height:1.6}

  /* input bar */
  footer{position:relative;z-index:5;padding:14px 22px;border-top:1px solid var(--line);
    background:linear-gradient(0deg,rgba(8,15,26,.8),transparent)}
  form{display:flex;gap:11px;align-items:center;max-width:1100px;margin:0 auto}
  .mic{width:48px;height:48px;flex:none;border-radius:50%;border:1.5px solid var(--accent);
    background:rgba(34,211,238,.08);color:var(--accent);font-size:19px;cursor:pointer;transition:.2s;box-shadow:var(--glow)}
  .mic:hover{background:rgba(34,211,238,.2)}
  .mic.rec{background:var(--accent);color:#04070d;animation:breath 1s infinite}
  input[type=text]{flex:1;background:var(--panel);border:1px solid var(--line);border-radius:26px;
    padding:14px 20px;color:var(--text);font-size:14.5px;outline:none;transition:.2s}
  input[type=text]:focus{border-color:var(--accent);box-shadow:var(--glow)}
  input::placeholder{color:var(--dim)}
  button.send{padding:0 24px;height:48px;border-radius:26px;border:none;cursor:pointer;font-size:14px;font-weight:600;
    letter-spacing:.06em;color:#04070d;background:linear-gradient(135deg,var(--accent2),var(--accent));transition:.2s}
  button.send:hover{filter:brightness(1.12)}
  button.send:disabled{opacity:.45;cursor:default}
  @media(max-width:760px){.convo{display:none}.core{width:62vw}}
</style>
</head>
<body class="s-idle">
  <header>
    <div class="brand"><span class="ring"></span><h1>ARJU&nbsp;<span>JARVIS</span></h1></div>
    <div class="spacer"></div>
    <div class="meta">
      <span id="sys" class="sys"></span>
      <span id="clock">--:--:--</span>
      <span class="conn"><span class="led"></span><span id="connText">offline</span></span>
    </div>
  </header>

  <main>
    <section class="stage">
      <div class="core">
        <div class="ringx r1"></div><div class="ringx r2"></div>
        <div class="ringx r3"></div><div class="ringx r4"></div>
        <div class="pulse"></div><div class="pulse d"></div>
        <div class="orb"></div>
        <div class="eq"><i></i><i></i><i></i><i></i><i></i><i></i><i></i></div>
      </div>
      <div class="status">
        <div class="word" id="stateWord">READY</div>
        <div class="hint" id="stateHint">Clap 3&times; or say &ldquo;Hey Jarvis&rdquo; &mdash; or just type below.</div>
      </div>
    </section>

    <aside class="convo">
      <h2>Conversation</h2>
      <div id="log"><div class="empty">No messages yet.<br>Say something or type to begin.</div></div>
    </aside>
  </main>

  <footer>
    <form id="form" autocomplete="off">
      <button type="button" class="mic" id="mic" title="Hold-to-talk (browser mic)">&#127908;</button>
      <input type="text" id="input" placeholder="Ask Arju Jarvis anything&hellip;" autofocus />
      <button type="submit" class="send" id="send">Send</button>
    </form>
  </footer>

<script>
(function(){
  "use strict";
  var logEl=document.getElementById('log'),
      input=document.getElementById('input'),
      send=document.getElementById('send'),
      form=document.getElementById('form'),
      mic=document.getElementById('mic'),
      stateWord=document.getElementById('stateWord'),
      stateHint=document.getElementById('stateHint'),
      connText=document.getElementById('connText'),
      clock=document.getElementById('clock');
  var firstMsg=true, speakPoll=null;

  function tick(){
    var d=new Date(), p=function(n){return (n<10?'0':'')+n;};
    clock.textContent=p(d.getHours())+':'+p(d.getMinutes())+':'+p(d.getSeconds());
  }
  tick(); setInterval(tick,1000);

  // ── system stats (CPU / RAM / battery) ──
  var sysEl=document.getElementById('sys');
  function stats(){
    fetch('/stats').then(function(r){return r.json();}).then(function(d){
      var b=(d.battery!=null)?' &middot; <b>'+d.battery+'%</b>&#128267;':'';
      sysEl.innerHTML='CPU <b>'+d.cpu+'%</b> &middot; RAM <b>'+d.mem+'%</b>'+b;
    }).catch(function(){});
  }
  stats(); setInterval(stats,5000);

  var STATES={
    idle:        {word:'READY',     hint:'Clap 3× or say “Hey Jarvis” — or just type below.'},
    listening:   {word:'LISTENING', hint:'I’m listening — what do you need?'},
    transcribing:{word:'…',     hint:'Catching your words…'},
    thinking:    {word:'THINKING',  hint:'Working on it…'},
    speaking:    {word:'SPEAKING',  hint:'Responding…'}
  };
  function setState(s){
    var cfg=STATES[s]||STATES.idle;
    document.body.className='s-'+(STATES[s]?(s==='transcribing'?'thinking':s):'idle')+(document.body.classList.contains('online')?' online':'');
    stateWord.textContent=cfg.word; stateHint.textContent=cfg.hint;
    if(s!=='speaking'&&speakPoll){clearInterval(speakPoll);speakPoll=null;}
  }

  function addMsg(kind,text,who){
    if(firstMsg){logEl.innerHTML='';firstMsg=false;}
    var m=document.createElement('div'); m.className='msg '+kind;
    if(who){var w=document.createElement('div');w.className='who';w.textContent=who;m.appendChild(w);}
    var t=document.createElement('div'); t.textContent=text; m.appendChild(t);
    logEl.appendChild(m); logEl.scrollTop=logEl.scrollHeight;
  }

  function watchSpeaking(){
    if(speakPoll)clearInterval(speakPoll);
    speakPoll=setInterval(function(){
      fetch('/speaking').then(function(r){return r.json();}).then(function(d){
        if(!d.speaking){clearInterval(speakPoll);speakPoll=null;setState('idle');}
      }).catch(function(){});
    },500);
  }

  var sseOK=false;
  function connect(){
    var es=new EventSource('/events');
    es.onopen=function(){sseOK=true;document.body.classList.add('online');connText.textContent='connected';};
    es.onerror=function(){sseOK=false;document.body.classList.remove('online');connText.textContent='reconnecting';};
    es.onmessage=function(ev){
      var e; try{e=JSON.parse(ev.data);}catch(_){return;}
      switch(e.type){
        case 'hello': break;
        case 'listening': setState('listening'); break;
        case 'transcribing': setState('transcribing'); break;
        case 'user': addMsg('me',e.text,'You'); break;
        case 'thinking': setState('thinking'); break;
        case 'reply': addMsg('jv',e.text,'Jarvis'); setState('speaking'); watchSpeaking(); break;
        case 'speaking': setState('speaking'); watchSpeaking(); break;
        case 'idle': setState('idle'); break;
        case 'error': addMsg('sys',e.text||'Something went wrong.'); setState('idle'); break;
      }
    };
  }
  connect();

  function sendText(text){
    text=(text||'').trim(); if(!text)return;
    send.disabled=true;
    if(!sseOK){addMsg('me',text,'You'); setState('thinking');}
    fetch('/turn',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({text:text})})
      .then(function(r){return r.json();})
      .then(function(d){ if(!sseOK){ if(d.reply){addMsg('jv',d.reply,'Jarvis');} else {addMsg('sys',d.error||'Error');} setState('idle'); } })
      .catch(function(){ addMsg('sys','Could not reach Jarvis.'); setState('idle'); })
      .finally(function(){ send.disabled=false; input.focus(); });
  }
  form.addEventListener('submit',function(ev){ev.preventDefault();var t=input.value;input.value='';sendText(t);});

  var SR=window.SpeechRecognition||window.webkitSpeechRecognition, rec=null;
  if(SR){
    rec=new SR(); rec.lang='en-US'; rec.interimResults=false; rec.maxAlternatives=1;
    rec.onresult=function(ev){sendText(ev.results[0][0].transcript);};
    rec.onend=function(){mic.classList.remove('rec');};
    rec.onerror=function(){mic.classList.remove('rec');};
    mic.addEventListener('click',function(){
      if(mic.classList.contains('rec')){rec.stop();return;}
      try{rec.start();mic.classList.add('rec');setState('listening');}catch(_){}
    });
  } else {
    mic.title='Browser mic not supported — use clap / Hey Jarvis, or type.';
    mic.addEventListener('click',function(){input.focus();});
  }
})();
</script>
</body>
</html>
